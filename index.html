<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container" aria-live="polite">
      <header class="header">
        <div>
          <h1>Bitcoin Dashboard</h1>
          <p class="subtitle">Live BTC market snapshot powered by CoinGecko.</p>
        </div>
        <button id="refresh-btn" type="button">Refresh</button>
      </header>

      <section class="status-row">
        <p id="loading" class="loading" hidden>Loading latest market data…</p>
        <p id="error" class="error" role="alert" hidden></p>
        <p class="last-updated">Last updated: <span id="last-updated">—</span></p>
      </section>

      <section class="stats-grid" aria-label="Bitcoin market statistics">
        <article class="stat-card">
          <h2>Price (USD)</h2>
          <p id="price-usd" class="value">—</p>
        </article>

        <article class="stat-card">
          <h2>Price (GBP)</h2>
          <p id="price-gbp" class="value">—</p>
        </article>

        <article class="stat-card">
          <h2>24h Change</h2>
          <p id="change-24h" class="value">—</p>
        </article>

        <article class="stat-card">
          <h2>24h High / Low</h2>
          <p id="high-low" class="value">—</p>
        </article>
      </section>

      <section class="chart-section" aria-label="Bitcoin price chart">
        <h2>BTCUSD Chart</h2>
        <div class="tradingview-widget-container">
          <div id="tradingview_btc_chart"></div>
          <script
            type="text/javascript"
            src="https://s3.tradingview.com/tv.js"
            async
          ></script>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
