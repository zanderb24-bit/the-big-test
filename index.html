<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loader-overlay" class="loader-overlay" role="status" aria-live="polite">
      <div class="loader-core">
        <div id="loader-ring" class="loader-ring" aria-hidden="true"></div>
        <div id="loader-dot" class="loader-dot" aria-hidden="true"></div>
        <p id="loader-text" class="loader-text">Booting dashboard…</p>
      </div>
    </div>

    <main id="dashboard-root" class="container dashboard-hidden" aria-live="polite">
      <header class="header">
        <div class="panel header-panel">
          <h1>Bitcoin Dashboard</h1>
          <p class="last-updated">Last updated: <span id="last-updated">—</span></p>
        </div>
        <div class="header-actions">
          <a class="nav-link-btn" href="test.html">Open Test Page</a>
          <button id="refresh-btn" type="button">Refresh</button>
        </div>
      </header>

      <section class="stats-grid" aria-label="Primary asset market statistics">
        <article class="stat-card" tabindex="0">
          <h2 id="main-stat-label-1">BTC Price (USD)</h2>
          <p id="btc-price-usd" class="value">—</p>
        </article>

        <article class="stat-card" tabindex="0">
          <h2 id="main-stat-label-2">BTC Price (GBP)</h2>
          <p id="btc-price-gbp" class="value">—</p>
        </article>

        <article class="stat-card" tabindex="0">
          <h2 id="main-stat-label-3">BTC 24h Change (%)</h2>
          <p id="btc-change-24h" class="value">—</p>
        </article>
      </section>

      <section class="chart-section" aria-label="Bitcoin price chart">
        <h2 id="main-chart-heading">BTCUSD Chart</h2>
        <div class="tradingview-widget-container chart-surface">
          <div id="tradingview_btc_chart"></div>
        </div>
      </section>

      <section class="asset-section" aria-label="Alternative assets">
        <h2>Alt Assets</h2>

        <div class="alt-assets-grid">
          <article class="asset-card" tabindex="0" data-main-asset="ethereum">
            <button class="set-main-btn" type="button" data-main-asset="ethereum" aria-label="Set Ethereum as main card">
              <span class="asset-name">Ethereum</span>
              <span class="asset-ticker">ETH</span>
            </button>
          </article>

          <article class="asset-card" tabindex="0" data-main-asset="gold">
            <button class="set-main-btn" type="button" data-main-asset="gold" aria-label="Set Gold as main card">
              <span class="asset-name">Gold</span>
              <span class="asset-ticker">XAUUSD</span>
            </button>
          </article>

          <article class="asset-card" tabindex="0" data-main-asset="oil">
            <button class="set-main-btn" type="button" data-main-asset="oil" aria-label="Set Crude Oil as main card">
              <span class="asset-name">Crude Oil</span>
              <span class="asset-ticker">WTI</span>
            </button>
          </article>

          <article class="asset-card" tabindex="0" data-main-asset="bitcoin">
            <button class="set-main-btn" type="button" data-main-asset="bitcoin" aria-label="Set Bitcoin as main card">
              <span class="asset-name">Bitcoin</span>
              <span class="asset-ticker">BTC</span>
            </button>
          </article>
        </div>
      </section>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js" async></script>
    <script src="app.js" defer></script>
  </body>
</html>
