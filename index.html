<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container" aria-live="polite">
      <header class="header">
        <div class="panel header-panel">
          <h1>Bitcoin Dashboard</h1>
          <p class="subtitle">Live BTC + ETH snapshot powered by CoinGecko.</p>
          <p class="last-updated">Last updated: <span id="last-updated">—</span></p>
        </div>
        <button id="refresh-btn" type="button">Refresh</button>
      </header>

      <section class="stats-grid" aria-label="Bitcoin market statistics">
        <article class="stat-card" tabindex="0">
          <h2>BTC Price (USD)</h2>
          <p id="btc-price-usd" class="value">—</p>
        </article>

        <article class="stat-card" tabindex="0">
          <h2>BTC Price (GBP)</h2>
          <p id="btc-price-gbp" class="value">—</p>
        </article>

        <article class="stat-card" tabindex="0">
          <h2>BTC 24h Change (%)</h2>
          <p id="btc-change-24h" class="value">—</p>
        </article>
      </section>

      <section class="chart-section" aria-label="Bitcoin price chart">
        <h2>BTCUSD Chart</h2>
        <div class="tradingview-widget-container chart-surface">
          <div id="tradingview_btc_chart"></div>
        </div>
      </section>

      <section class="asset-section" aria-label="Alternative assets">
        <h2>Alt Assets</h2>

        <div class="alt-assets-grid">
          <article class="asset-card" tabindex="0">
            <h3>Ethereum (ETH)</h3>
            <p>ETH Price (USD): <span id="eth-price-usd" class="value-inline">—</span></p>
            <p>
              ETH 24h Change (%):
              <span id="eth-change-24h" class="value-inline">—</span>
            </p>
            <p class="asset-label">Chart</p>
            <div class="tradingview-widget-container asset-chart">
              <div id="tradingview_eth_chart"></div>
            </div>
          </article>

          <article class="asset-card" tabindex="0">
            <h3>Gold (XAUUSD)</h3>
            <p class="asset-label">Chart</p>
            <div class="tradingview-widget-container asset-chart">
              <div id="tradingview_gold_chart"></div>
            </div>
          </article>

          <article class="asset-card" tabindex="0">
            <h3>Crude Oil (WTI)</h3>
            <p class="asset-label">Chart</p>
            <div class="tradingview-widget-container asset-chart">
              <div id="tradingview_oil_chart"></div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js" async></script>
    <script src="app.js" defer></script>
  </body>
</html>
