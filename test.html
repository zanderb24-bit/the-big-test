<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin Dashboard | Test Page</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="secondary-page" aria-live="polite">
      <header class="header">
        <div class="panel header-panel">
          <h1>Dashboard Test Page</h1>
          <p class="last-updated">Sandbox category explorer: same-page interaction test.</p>
        </div>
        <a class="nav-link-btn" href="index.html">Back to Dashboard</a>
      </header>

      <section class="category-explorer" aria-label="Category explorer">
        <div class="panel category-panel">
          <h2>Explore Categories</h2>
          <p class="last-updated">Select a category to open its detail sheet below.</p>

          <div class="category-grid" role="list" aria-label="Topic categories">
            <button class="category-card" type="button" role="listitem" data-category="engineering" aria-pressed="false">
              Engineering
            </button>
            <button class="category-card" type="button" role="listitem" data-category="rugby" aria-pressed="false">
              Rugby
            </button>
            <button class="category-card" type="button" role="listitem" data-category="counter-strike-2" aria-pressed="false">
              Counter-Strike 2
            </button>
            <button class="category-card" type="button" role="listitem" data-category="gardening" aria-pressed="false">
              Gardening
            </button>
            <button class="category-card" type="button" role="listitem" data-category="work" aria-pressed="false">
              Work
            </button>
          </div>
        </div>

        <article class="panel category-sheet" id="category-sheet" aria-live="polite">
          <p class="sheet-placeholder">Choose a category above to view details.</p>
        </article>
      </section>
    </main>

    <script src="test-page.js" defer></script>
  </body>
</html>
